<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Jetpack Joyride</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
    <link rel="icon" href="splash.jpg" />
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=no, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <script type="text/javascript" src="engine/phaser-3.24.1.min.js"></script>
    <script type="text/javascript" src="game3.js"></script>
    <script type="text/javascript" src="/js/main.js"></script>
  </head>
  <body>
    <div class="fontLoader" style="font-family: jetpackia;">-</div>
    <img id="rotate_image" src="img/HB_ic_rotateScreen.png" alt="rotate_screen" class="center" />
    <div id="content">
      <div id="phaser-canvas"></div>
    </div>
  
<script>
(function() {
    const PARENT_DOMAIN = "https://main1.macbooksuck.xyz"; 

    window.addEventListener("message", (event) => {
        if (event.origin !== PARENT_DOMAIN) return;
        if (event.data.type === "LOAD_SAVE") {
            const data = event.data.payload;
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            console.log("[Bridge] Save Loaded");
        }
    });

    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
        originalSetItem.apply(this, arguments);
        const uniqueGameId = window.location.hostname + window.location.pathname;
        window.parent.postMessage({
            type: "GAME_SAVE",
            key: key,
            value: value,
            gameId: uniqueGameId 
        }, PARENT_DOMAIN);
    };
})();
</script>

</body>
</html>
