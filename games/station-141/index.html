<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Station 141</title>
    <link rel="icon" href="icon.png" />
    <link rel="shortcut icon" href="icon.png" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script src="/js/main.js"></script>
    <script>
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/WebGL.json", { onProgress: UnityProgress });
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="unityContainer" style="width: 1280px; height: 720px;"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="unityInstance.SetFullscreen(1)"></div>
        <div class="title">Station 141</div>
      </div>
    </div>
  


<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>
</html>
