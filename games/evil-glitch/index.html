<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" sizes="192x192" href="icon.jpeg" />
        <link rel="shortcut icon" href="icon.jpeg" type="image/x-icon" />
        <link rel="apple-touch-icon" href="icon.jpeg" type="image/x-icon" />
        <script type="application/javascript" src="/js/main.js"></script>
        <title>Evil Glitch</title>
        <style>
            body {
                background: #000;
                margin: 0;
                padding: 0;
            }
            canvas {
                cursor: none;
                display: none;
            }
            #c {
                height: 100vh;
                margin: auto;
                display: block;
            }
            #f {
                font-family: monospace;
                position: absolute;
                bottom: 10px;
                left: 10px;
                font-size: 21px;
                color: #993;
                text-decoration: none;
            }
            #f:hover {
                color: #9aa;
            }
        </style>
    </head>
    <body allowfullscreen>
        <div id="d"><canvas id="c"></canvas><canvas id="g" moz-opaque></canvas></div>
        <a href="#" id="f" title="fullscreen">FullScreen</a>
        <script async src="b.js"></script>
    


<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>
</html>
