<html>
    <head>
        <link rel="icon" sizes="192x192" href="icon.jpeg" />
        <link rel="shortcut icon" href="icon.jpeg" type="image/x-icon" />
        <link rel="apple-touch-icon" href="icon.jpeg" type="image/x-icon" />
        <script type="application/javascript" src="/js/main.js"></script>
        <title>Evil Glitch</title>
        <style>
            body {
                background: #000;
                margin: 0;
                padding: 0;
            }
            canvas {
                cursor: none;
                display: none;
            }
            #c {
                height: 100vh;
                margin: auto;
                display: block;
            }
            #f {
                font-family: monospace;
                position: absolute;
                bottom: 10px;
                left: 10px;
                font-size: 21px;
                color: #993;
                text-decoration: none;
            }
            #f:hover {
                color: #9aa;
            }
        </style>
    </head>
    <body allowfullscreen>
        <div id="d"><canvas id="c"></canvas><canvas id="g" moz-opaque></canvas></div>
        <a href="#" id="f" title="fullscreen">FullScreen</a>
        <script async src="b.js"></script>
    
<script>
(function() {
    const PARENT_DOMAIN = "https://main1.macbooksuck.xyz"; 

    window.addEventListener("message", (event) => {
        if (event.origin !== PARENT_DOMAIN) return;
        if (event.data.type === "LOAD_SAVE") {
            const data = event.data.payload;
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            console.log("[Bridge] Save Loaded");
        }
    });

    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
        originalSetItem.apply(this, arguments);
        const uniqueGameId = window.location.hostname + window.location.pathname;
        window.parent.postMessage({
            type: "GAME_SAVE",
            key: key,
            value: value,
            gameId: uniqueGameId 
        }, PARENT_DOMAIN);
    };
})();
</script>

</body>
</html>
