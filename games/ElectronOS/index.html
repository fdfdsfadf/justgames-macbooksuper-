<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electron OS</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="src/style.min.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="button close"></div>
            <div class="button minimize"></div>
            <div class="button maximize"></div>
        </div>
        <div id="output" class="output"></div>
        <div class="input-line">
            <span id="prompt" class="prompt">user@electron:~$ </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>
    <script src="src/script.min.js"></script>



<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>
</html>
