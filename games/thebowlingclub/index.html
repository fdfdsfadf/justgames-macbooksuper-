<!DOCTYPE HTML>
<html style="overflow: hidden;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">


    <title>THE Bowling Club</title>

    <script src="js/phaser-superbowling.min.js"></script>
    <script src="js/jquery-2.1.3.min.js"></script>
    <script src="bowling-club.min.js"></script>



</head>

<body style="overflow: hidden;margin: 0;padding: 0;background-color: #000000;">

    <div id="gameContainer"></div>




<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>

</html>
