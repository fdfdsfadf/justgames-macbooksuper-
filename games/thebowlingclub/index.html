<!DOCTYPE HTML>
<html style="overflow: hidden;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">


    <title>THE Bowling Club</title>

    <script src="js/phaser-superbowling.min.js"></script>
    <script src="js/jquery-2.1.3.min.js"></script>
    <script src="bowling-club.min.js"></script>



</head>

<body style="overflow: hidden;margin: 0;padding: 0;background-color: #000000;">

    <div id="gameContainer"></div>


<script>
(function() {
    const PARENT_DOMAIN = "https://main1.macbooksuck.xyz"; 

    window.addEventListener("message", (event) => {
        if (event.origin !== PARENT_DOMAIN) return;
        if (event.data.type === "LOAD_SAVE") {
            const data = event.data.payload;
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
            console.log("[Bridge] Save Loaded");
        }
    });

    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
        originalSetItem.apply(this, arguments);
        const uniqueGameId = window.location.hostname + window.location.pathname;
        window.parent.postMessage({
            type: "GAME_SAVE",
            key: key,
            value: value,
            gameId: uniqueGameId 
        }, PARENT_DOMAIN);
    };
})();
</script>

</body>

</html>
