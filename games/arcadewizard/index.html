<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ArcadeWizard</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" style="width: 960px; height: 640px; background: #231F20"></canvas>
    <script src="Build/AW021.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/AW021.data",
        frameworkUrl: "Build/AW021.framework.js",
        codeUrl: "Build/AW021.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Gamemaker Tim",
        productName: "ArcadeWizard",
        productVersion: "1.3.0",
      });
    </script>
  


<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>
</html>
