<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Core Ball</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas style="display: none;" id="stage"></canvas>
    <div id="begin">
      <section class="center-box">
        <span class="title">Core Ball</span>
        <div class="button">
          <div id="txtAr">▶</div>
          <div class="text"></div>
        </div>
        <div class="op">
          <span id="btnFW"></span>
          <span id="btnReset"></span>
          <div id="tip"></div>
        </div>
      </section>
      <section id="wxArrow"></section>
    </div>
    <script type="text/javascript" src="index.js"></script>
    <script type="text/javascript" src="/js/main.js"></script>
  


<script>
(function () {
  const gameId = location.hostname + location.pathname;

  // LOAD from cloud
  window.addEventListener("message", (event) => {
    if (event.data?.type !== "LOAD_SAVE") return;
    const save = event.data.payload;
    if (!save) return;

    Object.entries(save).forEach(([k, v]) => {
      localStorage.setItem(k, v);
    });

    console.log("[CloudSave] HTML5 save restored");
  });

  // SAVE to cloud
  const originalSet = localStorage.setItem;
  localStorage.setItem = function (key, value) {
    originalSet.apply(this, arguments);
    if (window.parent?.cloudSave) {
      window.parent.cloudSave(gameId, { [key]: value });
    }
  };
})();
</script>
</body>
</html>
